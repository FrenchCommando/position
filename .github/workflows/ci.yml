name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # publish the APK as a GitHub Release
    steps:
      - uses: actions/checkout@v4

      # Recent Android Gradle Plugin needs JDK 17.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # NDK builds a native Rust event-verifier via a build hook, so every
      # compile (dart test, APK) needs a Rust toolchain present.
      - uses: dtolnay/rust-toolchain@stable

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.6
          channel: stable
          cache: true

      - name: Install app dependencies
        run: flutter pub get

      - name: Core package tests
        working-directory: packages/core
        run: |
          dart pub get
          dart test -x network   # skip the live-relay test in CI

      - name: Analyze
        run: flutter analyze

      - name: Widget tests
        run: flutter test

      # Release APK, debug-signed (see android/app/build.gradle.kts) — installs
      # like the debug build but a fraction of the size.
      - name: Build release APK
        run: flutter build apk --release

      - name: Name the APK
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk "dist/position-build${{ github.run_number }}.apk"

      # Also keep it as a plain artifact (available on PR runs too).
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: position-apk
          path: dist/position-build${{ github.run_number }}.apk

      # On main, publish a GitHub Release so the phone can install it directly:
      # open github.com/FrenchCommando/position/releases/latest and tap the APK.
      - name: Publish GitHub Release with APK
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: build ${{ github.run_number }}
          files: dist/position-build${{ github.run_number }}.apk
