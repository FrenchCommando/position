name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Recent Android Gradle Plugin needs JDK 17.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # NDK builds a native Rust event-verifier via a build hook, so every
      # compile (dart test, APK) needs a Rust toolchain present.
      - uses: dtolnay/rust-toolchain@stable

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.6
          channel: stable
          cache: true

      - name: Install app dependencies
        run: flutter pub get

      - name: Core package tests
        working-directory: packages/core
        run: |
          dart pub get
          dart test -x network   # skip the live-relay test in CI

      - name: Analyze
        run: flutter analyze

      - name: Widget tests
        run: flutter test

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: position-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
